<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>홈앤쇼핑 포탈</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 헤더 (Sticky) -->
  <header class="header">
    <h1>홈앤쇼핑 포탈</h1>
    <div id="current-time"></div>
  </header>

  <!-- 메인 컨텐츠 -->
  <main class="container">
    <!-- 모듈 1: 매출 분석 (Hero) -->
    <section class="card card-large">
      <h2>📈 매출 분석</h2>
      <p>실시간 매출 현황 및 성과 지표</p>
      <a href="analysis.html" class="btn">상세 분석 보기</a>
    </section>

    <!-- 모듈 2: 빠른 바로가기 -->
    <section class="card">
      <div id="system-links"></div>
    </section>

    <!-- 모듈 3: Claude AI 챗팅 -->
    <section class="card">
      <h2>💬 Claude 챗</h2>
      <form id="claude-form">
        <div style="display: flex; gap: var(--space-sm); align-items: flex-end;">
          <input type="text" id="claude-question" placeholder="질문을 입력하세요..." style="flex: 1; margin: 0;">
          <button type="submit" class="btn" style="width: auto; padding: 12px 20px; min-width: 60px; margin: 0;">
            검색
          </button>
        </div>
      </form>
      <div id="claude-response"></div>
    </section>

    <!-- 모듈 4: 사용자 설정 -->
    <section class="card">
      <h2>⚙️ 사용자 설정</h2>
      <a href="settings.html" class="btn">설정 열기</a>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <p>&copy; 2026 홈앤쇼핑 · 내부 포탈</p>
  </footer>

  <script src="js/constants.js"></script>
  <script src="js/claude-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
